<body>
    <div class="smth">
        <h1>КОТИКИ</h1>
        <div class="controls">
            <input type="text" placeholder="Промяукайте что-то">
            <button>МЯУ!</button>
        </div>
    </div>

    <div class="gallery">
        <img src="./pics/pic1.jpg" alt="KOTIK1" data-text="Плюшик вырос в большом городе, где каждый день был похож на маленький праздник. Он любит внимание и обожает наряжаться, особенно в забавные костюмы, которые дарят ему хозяева. Плюшик мечтает стать «звездой» социальных сетей, но при этом он невероятно заботлив и всегда первым приходит на помощь своим друзьям, когда им грустно.">
        <img src="./pics/pic2.jpg" alt="KOTIK2" data-text="Мямус родился в старом уютном доме у бабушки с садом. Он любопытен до невозможности: каждый день исследует уголки дома и двора, гоняется за бабочки и листочками. Несмотря на маленький рост, Мямус невероятно храбрый — он уже однажды спас птичку, застрявшую в кустах. Его мечта — открыть тайный уголок сада, полный чудес.">
        <img src="./pics/pic3.jpg" alt="KOTIK3" data-text="Мокко — настоящий философ среди котов. Он живёт на тихой улочке, любит долгие раздумья на солнце и тихие вечера под одеялом. Его пушистая шерсть — результат многолетней заботы и любимых лакомств хозяев. Мокко обладает даром предчувствовать настроение людей, поэтому часто оказывается рядом, когда кто-то грустит или устал. Он мечтает однажды увидеть море, о котором ему рассказывали соседи.">
        <img src="./pics/pic4.jpg" alt="KOTIK4" data-text="Луна — таинственный кот, появившийся однажды на пороге старого книжного магазина. Она кажется очень спокойной и загадочной, словно знает больше, чем показывает. Луна любит прятаться в мягких коробках и наблюдать за миром через стекло. Говорят, что она может «читать» мысли людей, а ночью её глаза светятся, как два маленьких фонарика. Луна мечтает найти легендарную луну-кристалл, которую когда-то видела во сне.">
    </div>
